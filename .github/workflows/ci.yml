name: CI

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  notify-on-failure:
    needs: validate
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update CI failure issue
        uses: actions/github-script@v9
        with:
          script: |
            const isPR = context.eventName === 'pull_request';
            const pr = context.payload.pull_request;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha.substring(0, 7);
            const titlePrefix = isPR ? `CI failure on PR #${pr.number}` : `CI failure on main`;
            const body = [
              isPR ? `\`validate\` failed on **PR #${pr.number}** — _${pr.title}_` : `\`validate\` failed on push to **main**.`,
              '',
              `- Run: ${runUrl}`,
              `- Commit: \`${sha}\``,
              isPR ? `- PR: ${pr.html_url}` : '',
            ].filter(Boolean).join('\n');

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const match = openIssues.find((i) => !i.pull_request && i.title.startsWith(titlePrefix));

            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Another failure:\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${titlePrefix}: ${sha}`,
                body,
              });
            }
